name: reproduce

# Clean-clone reproducibility + correctness gate.
# A cold ubuntu runner has no local cache and non-macOS paths, so every push automatically
# reproduces a reviewer's fresh-machine experience. It proves three things a solo author
# cannot check on their own machine:
#   1. the pinned environment installs and the pipeline RUNS from a clean checkout      (repro)
#   2. no machine-specific absolute paths survive in executable code                    (repro)
#   3. the load-bearing GFEVD / VAR / symmetrization math satisfies its invariants      (correctness)
# plus a deterministic, offline re-derivation of the headline out-of-sample number.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run the version matrix we might ship on. CPython 3.12 changed float sum() to compensated
        # (Neumaier) summation, so a matrix exposes any latent exact-`==` float assumption that a
        # single version would hide (false-floor lesson 1). Our checks use tolerances, so both pass.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned environment
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest hypothesis sympy

      - name: Guard against machine-specific absolute paths
        run: bash tools/check_paths.sh

      - name: Property / invariant tests (GFEVD, VAR, symmetrization null)
        run: pytest tests/ -q

      - name: Independent symbolic re-derivation of the GFEVD engine (exact oracle)
        run: python tools/verify_symbolic.py

      - name: Deterministic offline reproduction of the out-of-sample lead
        run: |
          cd out_of_sample_probe
          python reproduce_oos.py --offline | tee /tmp/oos.txt
          echo "--- asserting headline numbers are reproduced ---"
          grep -q '+7.98%' /tmp/oos.txt || { echo "MISSING: 2008 equities +7.98%"; exit 1; }
          grep -q '+5.00%' /tmp/oos.txt || { echo "MISSING: EM-FX +5.00%"; exit 1; }
          echo "OK: offline out-of-sample arm reproduces the expected leads"

      - name: Upload reproduction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oos-reproduction-log
          path: /tmp/oos.txt
