[tool:pytest]
testpaths = tests
addopts = -q

# Mutation testing (mutmut) — a periodic adequacy gate, run locally, NOT on every push
# (each mutant re-runs the whole suite, so a full pass is minutes, not seconds).
#
#   pip install mutmut
#   mutmut run           # inject faults into the core lib, check the tests catch them
#   mutmut results       # list any SURVIVING mutants = untested logic to harden
#   mutmut show <id>     # see a specific surviving mutant
#
# A surviving mutant in gfevd / connectedness / fit_var_nonneg / symmetrize is a real gap:
# it means a silent change to the load-bearing math would NOT be caught by the invariant
# tests. Add an assertion that kills it. Target the correctness-critical modules only.
[mutmut]
paths_to_mutate = pilot_cross_tier/lsa_capstone.py, pilot_review/directedness_null.py
tests_dir = tests/
runner = python -m pytest tests/ -x -q
